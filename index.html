<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Master Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #14141f;
    --card: #1a1a2e;
    --accent: #7c3aed;
    --low: #10b981;
    --medium: #f59e0b;
    --high: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse at 10% 10%, rgba(124,58,237,0.08) 0%, transparent 40%);
  }

  .container { max-width: 500px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stats { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Formulario Mejorado */
  .input-panel {
    background: var(--surface);
    padding: 1.2rem;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.8rem;
    border-radius: 10px;
    color: white;
    margin-bottom: 0.8rem;
    outline: none;
  }

  .controls { display: flex; gap: 0.5rem; }

  select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5rem;
    border-radius: 8px;
    font-size: 0.8rem;
    flex: 1;
  }

  #add-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  #add-btn:active { transform: scale(0.95); }

  /* Lista de Tareas */
  .task-list { list-style: none; }

  .task-item {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1rem;
    border-radius: 12px;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: slideIn 0.3s ease-out;
  }

  .priority-indicator { width: 4px; height: 30px; border-radius: 2px; flex-shrink: 0; }
  .priority-Baja { background: var(--low); }
  .priority-Media { background: var(--medium); }
  .priority-Alta { background: var(--high); }

  .task-content { flex: 1; }
  .task-title { display: block; font-size: 0.95rem; font-weight: 500; }
  .task-meta { font-size: 0.7rem; color: var(--muted); }

  .delete-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
  }

  .completed { opacity: 0.4; filter: grayscale(1); }
  .completed .task-title { text-decoration: line-through; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Pendientes</h1>
    <div class="stats" id="counter">0 Tareas restantes</div>
  </header>

  <div class="input-panel">
    <input type="text" id="task-input" placeholder="Nueva tarea (ej: Informe Bio-Pulso)...">
    <div class="controls">
      <select id="priority-select">
        <option value="Baja">Prioridad Baja</option>
        <option value="Media">Prioridad Media</option>
        <option value="Alta">Prioridad Alta</option>
      </select>
      <select id="category-select">
        <option value="Colegio">Colegio</option>
        <option value="SENA">SENA</option>
        <option value="Proyecto">Personal</option>
      </select>
      <button id="add-btn">Añadir</button>
    </div>
  </div>

  <ul class="task-list" id="task-list"></ul>
</div>

<script>
  const input = document.getElementById('task-input');
  const priority = document.getElementById('priority-select');
  const category = document.getElementById('category-select');
  const list = document.getElementById('task-list');
  const counter = document.getElementById('counter');

  document.addEventListener('DOMContentLoaded', loadTasks);
  document.getElementById('add-btn').addEventListener('click', addTask);

  function addTask() {
    if (!input.value.trim()) return;

    const taskObj = {
      id: Date.now(),
      text: input.value,
      priority: priority.value,
      category: category.value,
      done: false
    };

    createTaskElement(taskObj);
    saveTask(taskObj);
    input.value = '';
    updateCounter();
  }

  function createTaskElement(task) {
    const li = document.createElement('li');
    li.className = `task-item ${task.done ? 'completed' : ''}`;
    li.dataset.id = task.id;
    
    li.innerHTML = `
      <div class="priority-indicator priority-${task.priority}"></div>
      <div class="task-content">
        <span class="task-title">${task.text}</span>
        <span class="task-meta">${task.category} • Prioridad ${task.priority}</span>
      </div>
      <button class="delete-btn" onclick="removeTask(${task.id})">×</button>
    `;

    li.addEventListener('click', (e) => {
      if(e.target.tagName !== 'BUTTON') toggleTask(task.id, li);
    });

    list.prepend(li);
  }

  function saveTask(task) {
    let tasks = JSON.parse(localStorage.getItem('my_tasks') || '[]');
    tasks.push(task);
    localStorage.setItem('my_tasks', JSON.stringify(tasks));
  }

  function loadTasks() {
    let tasks = JSON.parse(localStorage.getItem('my_tasks') || '[]');
    tasks.forEach(task => createTaskElement(task));
    updateCounter();
  }

  function toggleTask(id, element) {
    let tasks = JSON.parse(localStorage.getItem('my_tasks'));
    tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
    localStorage.setItem('my_tasks', JSON.stringify(tasks));
    element.classList.toggle('completed');
    updateCounter();
  }

  function removeTask(id) {
    let tasks = JSON.parse(localStorage.getItem('my_tasks'));
    tasks = tasks.filter(t => t.id !== id);
    localStorage.setItem('my_tasks', JSON.stringify(tasks));
    document.querySelector(`[data-id="${id}"]`).remove();
    updateCounter();
  }

  function updateCounter() {
    let tasks = JSON.parse(localStorage.getItem('my_tasks') || '[]');
    const active = tasks.filter(t => !t.done).length;
    counter.innerText = `${active} ${active === 1 ? 'Tarea restante' : 'Tareas restantes'}`;
  }
</script>
</body>
</html>
